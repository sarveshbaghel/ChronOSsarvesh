{% extends "base/base.html" %}
{% block title %}Update Blood Stock{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="bc-card">
                <h5 class="fw-bold mb-4"><i class="bi bi-droplet-fill text-blood me-2"></i>Update Blood Stock</h5>
                <p class="text-muted mb-4">Enter current available units for each blood type</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        {% for field in form %}
                        <div class="col-6 col-md-3">
                            <label class="form-label text-center d-block fw-bold text-blood">{{ field.label }}</label>
                            {{ field }}
                        </div>
                        {% endfor %}
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-blood px-4">Update Stock</button>
                        <a href="{% url 'hospital_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
